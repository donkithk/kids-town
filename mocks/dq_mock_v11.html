<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DQ Battle v11 - Dramatic Effects</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12082a;font-family:'Courier New',sans-serif;display:flex;justify-content:center;min-height:100dvh}
.phone{width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

.battle-bg{position:absolute;inset:0;z-index:0}
.battle-bg .sky{position:absolute;inset:0;background:linear-gradient(180deg,#12082a,#1e0e3a 30%,#2d1b4e 55%,#3a2050 75%,#2a1535)}
.battle-bg .mountains{position:absolute;bottom:25%;left:0;right:0;height:20%;background:radial-gradient(ellipse 140px 70px at 10% 100%,rgba(60,35,90,.5),transparent),radial-gradient(ellipse 120px 60px at 30% 100%,rgba(50,25,80,.4),transparent),radial-gradient(ellipse 160px 80px at 50% 100%,rgba(70,45,100,.45),transparent),radial-gradient(ellipse 100px 50px at 70% 100%,rgba(40,30,70,.35),transparent),radial-gradient(ellipse 130px 65px at 88% 100%,rgba(60,35,90,.4),transparent)}
.battle-bg .ground{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(0deg,#1a2a18,#1e2e1c 30%,#263624 60%,transparent)}
.battle-bg .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.4}
.battle-bg .star:nth-child(1){top:5%;left:10%}.battle-bg .star:nth-child(2){top:9%;left:75%}.battle-bg .star:nth-child(3){top:3%;left:40%}.battle-bg .star:nth-child(4){top:12%;left:88%}

/* ── Full-screen effects overlays ── */
.effects-layer{position:absolute;inset:0;z-index:5;pointer-events:none}

/* White flash overlay */
.white-flash{position:absolute;inset:0;background:#fff;opacity:0;z-index:25;pointer-events:none}
.white-flash.active{animation:flashBurst .25s ease forwards}
@keyframes flashBurst{0%{opacity:.9}30%{opacity:.5}100%{opacity:0}}

/* Screen shake */
@keyframes shake{0%,100%{transform:translate(0,0)}10%{transform:translate(-6px,3px)}20%{transform:translate(6px,-2px)}30%{transform:translate(-4px,4px)}45%{transform:translate(4px,-3px)}60%{transform:translate(-2px,1px)}80%{transform:translate(2px,0)}}
.shake{animation:shake .5s ease}

/* Heavy shake - more violent */
@keyframes heavyShake{0%,100%{transform:translate(0,0)}5%{transform:translate(-8px,5px)}15%{transform:translate(8px,-4px)}25%{transform:translate(-6px,6px)}35%{transform:translate(6px,-5px)}50%{transform:translate(-4px,3px)}65%{transform:translate(4px,-2px)}80%{transform:translate(-2px,1px)}}
.heavy-shake{animation:heavyShake .6s ease}

/* ── Hit effects ── */

/* Monster hit - shrink + wobble */
@keyframes monsterHit{0%{transform:scale(1) translateX(0)}10%{transform:scale(.85) translateX(-8px)}25%{transform:scale(.9) translateX(6px)}40%{transform:scale(.92) translateX(-5px)}55%{transform:scale(.95) translateX(3px)}70%{transform:scale(.97) translateX(-2px)}100%{transform:scale(1) translateX(0)}}
.monster-hit{animation:monsterHit .5s ease}

/* Heavy hit - monster gets pushed back further, longer stun */
@keyframes heavyMonsterHit{0%{transform:scale(1) translateX(0) rotate(0)}8%{transform:scale(.75) translateX(-12px) rotate(-5deg)}20%{transform:scale(.82) translateX(8px) rotate(3deg)}35%{transform:scale(.88) translateX(-6px) rotate(-2deg)}50%{transform:scale(.92) translateX(4px) rotate(1deg)}70%{transform:scale(.96) translateX(-2px) rotate(0)}100%{transform:scale(1) translateX(0) rotate(0)}}
.monster-heavy{animation:heavyMonsterHit .6s ease}

/* Hit spark burst */
@keyframes sparkBurst{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(2)}}
.spark-burst{position:absolute;top:50%;left:50%;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,rgba(255,200,50,.8),rgba(255,100,0,.3),transparent);transform:translate(-50%,-50%);z-index:8;pointer-events:none;animation:sparkBurst .35s ease forwards}

/* Heavy spark with star */
@keyframes heavySpark{0%{opacity:1;transform:translate(-50%,-50%) scale(0)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.8)}60%{opacity:.6;transform:translate(-50%,-50%) scale(2.5)}100%{opacity:0;transform:translate(-50%,-50%) scale(3)}}
.heavy-spark{position:absolute;top:50%;left:50%;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.9),rgba(255,200,0,.5),rgba(255,80,0,.2),transparent);transform:translate(-50%,-50%);z-index:8;pointer-events:none;animation:heavySpark .4s ease forwards}

/* Slash mark */
@keyframes slashAnim{0%{opacity:0;transform:translate(-50%,-50%) scaleX(0) rotate(-30deg)}20%{opacity:1;transform:translate(-50%,-50%) scaleX(1) rotate(-30deg)}80%{opacity:1;transform:translate(-50%,-50%) scaleX(1) rotate(-30deg)}100%{opacity:0;transform:translate(-50%,-50%) scaleX(0) rotate(-30deg)}}
.slash{position:absolute;top:50%;left:50%;width:100px;height:4px;background:linear-gradient(90deg,transparent,#fff,#ffcc44,transparent);border-radius:2px;transform:translate(-50%,-50%) rotate(-30deg);z-index:9;pointer-events:none;box-shadow:0 0 15px rgba(255,200,68,.6);animation:slashAnim .3s ease forwards}

/* Death - dramatic fade */
@keyframes deathDramatic{0%{opacity:1;transform:scale(1)}20%{transform:scale(1.2) rotate(8deg);opacity:.8}40%{transform:scale(.3) rotate(-15deg);opacity:.5;filter:brightness(2)}100%{opacity:0;transform:scale(.1) translateY(40px);filter:brightness(0)}}
.monster-card.dead{animation:deathDramatic .7s forwards}

/* ── Damage popup ── */
.dmg-popup{position:absolute;top:-20px;left:50%;z-index:10;pointer-events:none;font-weight:bold;text-align:center}
.dmg-popup .num{font-size:28px;color:#fff;text-shadow:0 0 15px rgba(255,200,0,.7),3px 3px 0 #000, -1px -1px 0 #000;animation:dmgBounce .7s cubic-bezier(.28,.84,.42,1) forwards}
.dmg-popup.heavy .num{font-size:36px;color:#ff8800;text-shadow:0 0 25px rgba(255,136,0,.8),4px 4px 0 #000, -2px -2px 0 #000}
@keyframes dmgBounce{0%{opacity:0;transform:translate(-50%,0) scale(.3)}20%{opacity:1;transform:translate(-50%,-10px) scale(1.3)}40%{transform:translate(-50%,-25px) scale(1)}60%{transform:translate(-50%,-35px) scale(1.05)}100%{opacity:1;transform:translate(-50%,-50px) scale(1)}}

/* ── Heal effects ── */
@keyframes healGlow{0%{box-shadow:inset 0 0 0 rgba(102,238,136,0)}30%{box-shadow:inset 0 0 40px rgba(102,238,136,.5)}70%{box-shadow:inset 0 0 20px rgba(102,238,136,.3)}100%{box-shadow:inset 0 0 0 rgba(102,238,136,0)}}
.heal-glow{animation:healGlow .8s ease}

/* Heal sparkles - multiple dots floating up */
@keyframes sparkle1{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:1;transform:translateY(-10px) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(.3)}}
@keyframes sparkle2{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:1;transform:translateY(-5px) scale(1)}100%{opacity:0;transform:translateY(-45px) scale(.2)}}
@keyframes sparkle3{0%{opacity:0;transform:translateY(0) scale(0)}20%{opacity:1;transform:translateY(-15px) scale(.8)}100%{opacity:0;transform:translateY(-55px) scale(.2)}}
.heal-sparkle{position:absolute;width:6px;height:6px;border-radius:50%;background:#66ee88;z-index:11;pointer-events:none}
.heal-sparkle.s1{left:30%;top:40%;animation:sparkle1 .8s ease forwards}
.heal-sparkle.s2{left:55%;top:35%;animation:sparkle2 .9s ease forwards;width:4px;height:4px}
.heal-sparkle.s3{left:70%;top:45%;animation:sparkle3 .75s ease forwards;width:5px;height:5px}
.heal-sparkle.s4{left:45%;top:30%;animation:sparkle2 .85s ease forwards .1s;width:3px;height:3px}
.heal-sparkle.s5{left:60%;top:50%;animation:sparkle1 .7s ease forwards .05s;width:4px;height:4px}

/* Heal number */
.heal-num{position:absolute;top:-5px;left:50%;z-index:12;font-size:26px;font-weight:bold;color:#66ee88;text-shadow:0 0 15px rgba(102,238,136,.5),2px 2px 0 #000;pointer-events:none;animation:healFloat .9s cubic-bezier(.28,.84,.42,1) forwards}
@keyframes healFloat{0%{opacity:0;transform:translate(-50%,0) scale(.3)}20%{opacity:1;transform:translate(-50%,-10px) scale(1.3)}100%{opacity:1;transform:translate(-50%,-40px) scale(1)}}

/* ── Buff effects ── */
@keyframes buffRise{0%{opacity:0;transform:translateY(10px) scale(0)}60%{opacity:1;transform:translateY(-5px) scale(1.3)}100%{opacity:1;transform:translateY(0) scale(1)}}
.buff-icon{display:inline-block;font-size:18px;margin-left:4px;vertical-align:middle;animation:buffRise .4s cubic-bezier(.28,.84,.42,1) forwards}
@keyframes buffPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.buff-pulse{animation:buffPulse .6s ease-in-out infinite}

/* Buff flash on player card */
@keyframes buffFlash{0%{box-shadow:inset 0 0 0 rgba(255,200,50,0),0 0 0 rgba(255,200,50,0)}30%{box-shadow:inset 0 0 30px rgba(255,200,50,.4),0 0 25px rgba(255,200,50,.3)}70%{box-shadow:inset 0 0 15px rgba(255,200,50,.2),0 0 10px rgba(255,200,50,.1)}100%{box-shadow:inset 0 0 0 rgba(255,200,50,0),0 0 0 rgba(255,200,50,0)}}
.buff-flash{animation:buffFlash .5s ease}

/* ── Content ── */
.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

.monster-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px 10px 4px;min-height:200px}
.monster-row{display:flex;justify-content:center;gap:8px;width:100%;flex-wrap:wrap;align-items:flex-end}
.monster-card{width:76px;text-align:center;cursor:pointer;padding:4px;border-radius:12px;border:2px solid transparent;position:relative}
.monster-card:active{transform:scale(.92)}
.monster-card.targetable{border-color:#ffcc44;background:rgba(255,204,68,.08);animation:glow .6s infinite alternate}
@keyframes glow{0%{box-shadow:0 0 8px rgba(255,204,68,.2)}100%{box-shadow:0 0 20px rgba(255,204,68,.5)}}
.monster-card .m-img{width:60px;height:60px;margin:0 auto;position:relative}
.monster-card .m-img img{width:100%;height:100%;object-fit:contain;display:block}
.monster-card .m-name{color:#ffe0bb;font-size:11px;font-weight:bold;margin-top:2px;text-shadow:0 1px 4px #000}
.monster-card .m-hp-bar{height:5px;background:rgba(0,0,0,.5);border-radius:2px;margin:2px 4px 0;border:1px solid rgba(255,255,255,.08)}
.monster-card .m-hp-fill{height:100%;border-radius:2px}
.monster-card .m-hp-text{color:#ddd;font-size:10px;margin-top:1px;text-shadow:0 1px 3px #000;font-weight:bold}
.monster-card .target-arrow{display:none;position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:16px;color:#ffcc44}
.monster-card.targetable .target-arrow{display:block;animation:arrowBounce .5s infinite alternate}
@keyframes arrowBounce{0%{transform:translateX(-50%) translateY(0)}100%{transform:translateX(-50%) translateY(-4px)}}

.player-zone{padding:2px 10px 6px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.player-card{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 6px;width:auto;min-width:95px;max-width:115px;cursor:default;transition:all .15s;position:relative}
.player-card.targetable{cursor:pointer;border-color:#66ee88;background:rgba(102,238,136,.08);animation:glowGreen .6s infinite alternate}
@keyframes glowGreen{0%{box-shadow:0 0 8px rgba(102,238,136,.2)}100%{box-shadow:0 0 20px rgba(102,238,136,.5)}}
.player-card .p-row{display:flex;gap:5px}
.player-card .p-img{width:30px;height:30px;flex-shrink:0;position:relative}
.player-card .p-img img{width:100%;height:100%;object-fit:cover;display:block;border-radius:3px}
.player-card .p-name{color:#fff;font-size:11px;font-weight:bold;text-shadow:0 1px 3px #000;margin-bottom:3px}

.bar{position:relative;height:14px;margin-bottom:2px}
.bar-track{position:absolute;inset:0;height:14px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.bar-fill{height:100%;border-radius:3px}
.bar-fill.hp{background:#33dd55}
.bar-fill.mp{background:#4488ff}
.bar-lbl{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:bold;z-index:1;text-shadow:0 1px 2px #000}
.bar-lbl.h{color:#ff5555}.bar-lbl.m{color:#5577ff}
.bar-val{position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:bold;color:#fff;z-index:1;text-shadow:0 1px 2px #000}

.log-window{background:rgba(0,0,0,.75);border:2px solid #4a5a7a;border-radius:8px;margin:2px 10px;padding:5px 10px;min-height:40px}
.log-text{color:#ccd;font-size:12px;line-height:1.5;font-weight:bold}
.log-text .atk{color:#ff8844}.log-text .def{color:#66ee66}.log-text .skl{color:#ddaaff}.log-text .info{color:#aabbdd}

.cmd-menu{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:3px 10px 6px}
.cmd-btn{background:linear-gradient(180deg,#1f3055,rgba(13,27,42,.9));border:2px solid #4a6a8a;border-radius:10px;padding:9px 0;color:#cce;font-size:16px;font-weight:bold;text-align:center;cursor:pointer;font-family:inherit;text-shadow:0 1px 0 #000;box-shadow:0 3px 0 #0a1a2a}
.cmd-btn:active{transform:translateY(3px);box-shadow:none}
.cmd-btn.active{background:linear-gradient(180deg,#2a4570,#1f3055);border-color:#ffcc44;color:#ffe0aa}

.skill-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.skill-overlay.active{display:flex}
.skill-overlay h3{color:#ddaaff;font-size:18px;margin-bottom:4px;text-shadow:0 2px 6px #000}
.skill-overlay .mp-hint{color:#889;font-size:11px;margin-bottom:12px}
.skill-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.skill-item{background:rgba(40,30,60,.85);border:2px solid #6a4a8a;border-radius:10px;padding:10px 14px;text-align:center;cursor:pointer;width:90px}
.skill-item:active{background:rgba(60,40,80,.9);border-color:#8a6aaa}
.skill-item .s-icon{font-size:24px}.skill-item .s-name{color:#ddaaff;font-size:12px;font-weight:bold}
.skill-item .s-mp{color:#6688ff;font-size:10px;margin-top:2px;font-weight:bold}
.skill-item .s-desc{color:#889;font-size:8px}
.skill-item.disabled{opacity:.4;pointer-events:none}
.skill-back{color:#889;font-size:12px;margin-top:14px;cursor:pointer;padding:5px 20px;border:1px solid #557;border-radius:6px}

.dbt-footer{margin:1px 10px 6px;padding:6px 10px;background:rgba(0,0,0,.55);border:1.5px solid #4a5a7a;border-radius:7px;color:#cce;font-size:12px;text-align:center}
.dbt-footer .hl{color:#ffcc44}

.result-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center}
.result-overlay.active{display:flex}
.result-overlay h1{font-size:36px}.result-overlay .sub{color:#fff;font-size:15px;margin:4px 0 12px;font-weight:bold}
.result-overlay .rewards{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.result-overlay .r-item{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:5px 10px;color:#ffcc44;font-size:12px;font-weight:bold}
.result-overlay button{background:#f59e0b;border:none;border-radius:8px;padding:7px 24px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #b87a00}
</style>
</head><body>
<div class="phone">
  <div class="battle-bg"><div class="sky"></div><div class="mountains"></div><div class="ground"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
  </div>

  <div class="effects-layer">
    <div class="white-flash" id="whiteFlash"></div>
  </div>

  <div class="content" id="mainContent">
    <div class="monster-zone"><div class="monster-row" id="monsterRow"></div></div>
    <div class="player-zone" id="playerZone"></div>
    <div class="log-window">
      <div class="log-text" id="logText"><span class="info">⚔️ 戰鬥開始！</span><br><span class="info">🌲 3 隻野狼出現了！</span></div>
    </div>
    <div class="cmd-menu">
      <div class="cmd-btn" id="btnFight" onclick="startTarget('attack')">⚔️ 攻擊</div>
      <div class="cmd-btn" onclick="doAction('defend')">🛡️ 防禦</div>
      <div class="cmd-btn" id="btnSkill" onclick="openSkills()">💥 技能</div>
      <div class="cmd-btn" onclick="doAction('flee')">🏃 逃走</div>
    </div>
    <div class="dbt-footer" id="dbtFooter"><span class="hl">⚔️ 進入戰鬥！vs 3 隻野狼</span></div>
  </div>

  <div class="skill-overlay" id="skillOverlay">
    <h3>💥 選擇技能</h3>
    <div class="mp-hint">使用技能需要消耗 MP</div>
    <div class="skill-grid" id="skillGrid"></div>
    <div class="skill-back" onclick="hideSkills()">↩️ 返回</div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <h1>🎉</h1><div class="sub">戰鬥勝利！</div>
    <div class="rewards" id="rewards"></div>
    <button onclick="this.closest('.result-overlay').classList.remove('active')">👍 太好了！</button>
  </div>
</div>

<script>
// ── Data ──
const BUILDINGS = [
  { def_id: 7, name: '健身房', level: 2 },
  { def_id: 8, name: '醫院',   level: 3 },
];
const SKILL_DEFS = [
  { id:'heavy', name:'重擊', icon:'💪', mpCost:5, lvReq:2, bldgId:7, desc:'強力一擊！', dmgBase:8, dmgPerLv:3, attr:'str', target:'enemy' },
  { id:'heal',  name:'急救', icon:'💚', mpCost:8, lvReq:3, bldgId:8, desc:'回復我方血量', healBase:10, healPerLv:4, attr:'int', target:'ally' },
  { id:'power', name:'蓄力', icon:'🔥', mpCost:3, lvReq:1, bldgId:7, desc:'下次攻擊x1.5', target:'self' },
];
const MONSTERS = [
  { n:'小野狼', i:'🐺', hp:18, mh:22, lv:1 },
  { n:'灰狼',   i:'🐺', hp:22, mh:26, lv:1 },
  { n:'頭狼',   i:'🐺', hp:30, mh:35, lv:2 },
];
const PARTY = [
  { n:'小明', img:'assets-c/boy.png',  hp:28, mh:30, mp:12, mm:15, lv:3, str:8, inte:5, buff:null },
  { n:'小美', img:'assets-c/girl.png', hp:22, mh:24, mp:18, mm:20, lv:2, str:4, inte:9, buff:null },
  { n:'阿強', img:'assets-c/boy2.png', hp:36, mh:40, mp:6,  mm:10, lv:3, str:10,inte:3, buff:null },
];
const MIMG = 'https://image.pollinations.ai/prompt/cute%20chibi%20wolf%20pixel%20art%20game%20sprite%20transparent%20bg';
let T = null;
let pendingSkill = null;

function flash(){
  const f=document.getElementById('whiteFlash');
  f.classList.remove('active');void f.offsetWidth;
  f.classList.add('active');
  setTimeout(()=>f.classList.remove('active'),300);
}

function r(){
  const row=document.getElementById('monsterRow');
  const alive=MONSTERS.filter(m=>m.hp>0);
  const showMonsterTarget = T==='attack' || (pendingSkill && pendingSkill.target==='enemy');
  row.innerHTML=alive.map((m,i)=>{
    const o=MONSTERS.indexOf(m),p=Math.round(m.hp/m.mh*100),bc=p>50?'#44cc44':p>25?'#ffaa44':'#ff4444';
    return `<div class="monster-card ${showMonsterTarget?'targetable':''}" data-idx="${o}" onclick="c(${o})">
      <div class="target-arrow">▼</div>
      <div class="m-img"><img src="${MIMG}" onerror="this.outerHTML='<span style=font-size:40px>${m.i}</span>'"></div>
      <div class="m-name">${m.i} ${m.n} Lv.${m.lv}</div>
      <div class="m-hp-bar"><div class="m-hp-fill" style="width:${p}%;background:${bc}"></div></div>
      <div class="m-hp-text">${m.hp}/${m.mh}</div>
    </div>`;
  }).join('');
  if(alive.length===0&&!document.getElementById('resultOverlay').classList.contains('active'))
    setTimeout(()=>{document.getElementById('resultOverlay').classList.add('active');
      document.getElementById('rewards').innerHTML='<span class="r-item">🪙 30</span><span class="r-item">🪵 x3</span><span class="r-item">✨ x50</span>';},600);

  const showAllyTarget = pendingSkill && pendingSkill.target==='ally';
  document.getElementById('playerZone').innerHTML=PARTY.map((p,pIdx)=>{
    const h=Math.round(p.hp/p.mh*100),m=Math.round(p.mp/p.mm*100);
    return `<div class="player-card ${showAllyTarget?'targetable':''}" onclick="${showAllyTarget ? `cAlly(${pIdx})` : ''}">
      <div class="p-row">
        <div class="p-img"><img src="${p.img}" onerror="this.outerHTML='<span style=font-size:22px>🧒</span>'"></div>
        <div style="flex:1">
          <div class="p-name">Lv.${p.lv} ${p.n}${p.buff ? `<span class="buff-icon ${p.buff.type==='power'?'buff-pulse':''}">${p.buff.icon}</span>` : ''}</div>
          <div class="bar"><div class="bar-track"><div class="bar-fill hp" style="width:${h}%"></div></div><span class="bar-lbl h">HP</span><span class="bar-val">${p.hp}/${p.mh}</span></div>
          <div class="bar"><div class="bar-track"><div class="bar-fill mp" style="width:${m}%"></div></div><span class="bar-lbl m">MP</span><span class="bar-val">${p.mp}/${p.mm}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
  const bF=document.getElementById('btnFight'),bS=document.getElementById('btnSkill');
  if(bF)bF.classList.toggle('active',T==='attack');
  if(bS)bS.classList.toggle('active',!!pendingSkill);
}

function c(i){
  if(T==='attack'){a(i);return;}
  if(pendingSkill && pendingSkill.target==='enemy'){useSkill(i,null);return;}
}
function cAlly(pIdx){
  if(pendingSkill && pendingSkill.target==='ally'){useSkill(null,pIdx);return;}
}

function startTarget(m){
  if(T===m){T=null;r();document.getElementById('logText').innerHTML='<span class="info">⚔️ 選擇指令...</span>';return;}
  T=m;r();
  document.getElementById('logText').innerHTML='<span class="atk">⚔️ 攻擊誰？點擊怪獸選擇目標</span>';
  document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊上面的怪獸選擇目標</span>';
}

function openSkills(){
  const overlay=document.getElementById('skillOverlay'),grid=document.getElementById('skillGrid');
  const avail=getAvailableSkills();
  grid.innerHTML=avail.map(sk=>{
    const p=PARTY[0], enough=p.mp>=sk.mpCost;
    return `<div class="skill-item ${enough?'':'disabled'}" onclick="${enough?`selectSkill('${sk.id}')`:''}">
      <span class="s-icon">${sk.icon}</span>
      <div class="s-name">${sk.name}</div>
      <div class="s-mp">MP ${sk.mpCost}</div>
      <div class="s-desc">${sk.desc}</div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}
function hideSkills(){document.getElementById('skillOverlay').classList.remove('active')}
function getAvailableSkills(){return SKILL_DEFS.filter(sk=>{const b=BUILDINGS.find(b=>b.def_id===sk.bldgId);return b&&b.level>=sk.lvReq})}

function selectSkill(skillId){
  hideSkills();
  const sk=SKILL_DEFS.find(s=>s.id===skillId);
  pendingSkill=sk;T=null;
  if(sk.target==='self'){useSkill(null,0);return;}
  r();
  if(sk.target==='enemy'){
    document.getElementById('logText').innerHTML=`<span class="skl">💥 使用 ${sk.name}？點擊怪獸</span>`;
    document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊怪獸</span>';
  } else if(sk.target==='ally'){
    document.getElementById('logText').innerHTML=`<span class="skl">💚 對誰使用 ${sk.name}？點擊隊友</span>`;
    document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊隊友</span>';
  }
}

function useSkill(monsterIdx, playerIdx){
  const sk=pendingSkill; if(!sk)return; pendingSkill=null;
  if(sk.target==='self') playerIdx=0;
  const p=PARTY[playerIdx||0]; if(!p)return;
  p.mp=Math.max(0,p.mp-sk.mpCost);
  let msg='';

  if(sk.id==='heavy'){
    const bldg=BUILDINGS.find(b=>b.def_id===sk.bldgId);
    const lvlBonus=(bldg?bldg.level:1)*sk.dmgPerLv;
    const dmg=sk.dmgBase+lvlBonus+Math.floor(p.str/2)+Math.floor(Math.random()*4);
    MONSTERS[monsterIdx].hp=Math.max(0,MONSTERS[monsterIdx].hp-dmg);
    msg=`<span class="skl">💪 ${p.n} ${sk.name}！${dmg} 點傷害！</span>`;

    const mc=document.querySelector(`.monster-card[data-idx="${monsterIdx}"]`);
    if(mc){
      // 1. Flash
      flash();
      // 2. Heavy spark
      const spark=document.createElement('div'); spark.className='heavy-spark';
      mc.querySelector('.m-img').appendChild(spark);
      // 3. Slash mark
      const slash=document.createElement('div'); slash.className='slash';
      mc.querySelector('.m-img').appendChild(slash);
      // 4. Monster shake
      mc.classList.add('monster-heavy');
      document.getElementById('mainContent').classList.add('heavy-shake');
      // 5. Damage popup (bounce)
      const pop=document.createElement('div'); pop.className='dmg-popup heavy';
      pop.innerHTML=`<span class="num">${dmg}</span>`;
      mc.querySelector('.m-img').appendChild(pop);
      setTimeout(()=>{
        mc.classList.remove('monster-heavy');
        document.getElementById('mainContent').classList.remove('heavy-shake');
        MONSTERS[monsterIdx].hp<=0?(mc.classList.add('dead'),setTimeout(()=>r(),700)):r();
      },600);
    }else r();
    
  } else if(sk.id==='heal'){
    const bldg=BUILDINGS.find(b=>b.def_id===sk.bldgId);
    const lvlBonus=(bldg?bldg.level:1)*sk.healPerLv;
    const heal=sk.healBase+lvlBonus+Math.floor(p.inte/2);
    PARTY[playerIdx].hp=Math.min(PARTY[playerIdx].mh, PARTY[playerIdx].hp+heal);
    msg=`<span class="skl">💚 ${p.n} ${sk.name} ${PARTY[playerIdx].n} +${heal} HP</span>`;
    r();
    // Heal effects
    const pc=document.querySelectorAll('.player-card')[playerIdx];
    if(pc){
      pc.classList.add('heal-glow');
      // Green sparkles
      for(let i=1;i<=5;i++){
        const sp=document.createElement('div'); sp.className=`heal-sparkle s${i}`;
        pc.querySelector('.p-img').appendChild(sp);
        setTimeout(()=>sp.remove(),900);
      }
      // Heal number
      const hn=document.createElement('div'); hn.className='heal-num';
      hn.textContent='+'+heal;
      pc.querySelector('.p-img').appendChild(hn);
      setTimeout(()=>hn.remove(),1000);
    }
    
  } else if(sk.id==='power'){
    p.buff={type:'power', icon:'🔥', name:'蓄力'};
    msg=`<span class="skl">🔥 ${p.n} 蓄力！下次1.5倍</span>`;
    r();
    // Buff flash on player
    const pc=document.querySelectorAll('.player-card')[playerIdx||0];
    if(pc){
      pc.classList.add('buff-flash');
      setTimeout(()=>pc.classList.remove('buff-flash'),500);
    }
  }

  document.getElementById('logText').innerHTML=msg;
  document.getElementById('dbtFooter').innerHTML=`<span class="hl">💥 ${sk.name}！</span>`;
  T=null;
}

function doAction(t){
  T=null;pendingSkill=null;r();
  const e=document.getElementById('logText'),f=document.getElementById('dbtFooter');
  if(t==='defend'){e.innerHTML='<span class="def">🛡️ 小明 防禦姿態！</span>';f.innerHTML='🛡️ 防禦中！'}
  if(t==='flee'){e.innerHTML='<span class="info">🏃 逃走了！</span>';f.innerHTML='🏃 返回小鎮...'}
}

function a(i){
  T=null;
  let d=3+Math.floor(Math.random()*5);
  const p=PARTY[0];
  let hadBuff=p.buff!==null;
  if(p.buff&&p.buff.type==='power'){d=Math.round(d*1.5);p.buff=null;}
  MONSTERS[i].hp=Math.max(0,MONSTERS[i].hp-d);
  const mc=document.querySelector(`.monster-card[data-idx="${i}"]`);
  if(mc){
    flash();
    const spark=document.createElement('div');spark.className='spark-burst';
    mc.querySelector('.m-img').appendChild(spark);
    const slash=document.createElement('div');slash.className='slash';
    mc.querySelector('.m-img').appendChild(slash);
    mc.classList.add('monster-hit');
    document.getElementById('mainContent').classList.add('shake');
    const pop=document.createElement('div');pop.className='dmg-popup';
    pop.innerHTML=`<span class="num">${d}</span>`;
    mc.querySelector('.m-img').appendChild(pop);
    setTimeout(()=>{
      mc.classList.remove('monster-hit');document.getElementById('mainContent').classList.remove('shake');
      MONSTERS[i].hp<=0?(mc.classList.add('dead'),setTimeout(()=>r(),700)):r();
    },500);
  }else r();
  document.getElementById('logText').innerHTML=`<span class="atk">⚔️ 攻擊 ${MONSTERS[i].n}！${hadBuff?'（蓄力！）':''}<br>🐺 ${d} 點傷害！</span>`;
  document.getElementById('dbtFooter').innerHTML=`<span class="hl">⚔️ ${d} 點傷害！</span>`;
}

r();
</script></body></html>
