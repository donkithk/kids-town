<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DQ Style Battle Mock</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@font-face{font-family:'DQF';src:local('Courier New'),local('monospace')}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:'DQF',monospace}
#phone{width:375px;height:812px;background:linear-gradient(180deg,#1a2a3a 0%,#0d1b2a 50%,#000 100%);border-radius:30px;overflow:hidden;position:relative;box-shadow:0 0 60px rgba(0,120,255,.15),inset 0 0 0 2px rgba(255,255,255,.08);display:flex;flex-direction:column}

/* ── Top: Monster Zone ── */
.monster-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding-top:20px}
.monster-zone::before{content:'';position:absolute;top:0;left:0;right:0;height:40%;background:linear-gradient(180deg,rgba(100,80,200,.08),transparent)}
.monster-sprite{width:120px;height:120px;border-radius:16px;overflow:hidden;margin-bottom:4px;image-rendering:pixelated;filter:drop-shadow(0 8px 32px rgba(255,100,0,.3));animation:monsterBob 2s ease-in-out infinite}
@keyframes monsterBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.monster-sprite img{width:100%;height:100%;object-fit:cover}
.monster-name{color:#ffcc88;font-size:16px;font-weight:bold;text-shadow:0 2px 4px rgba(0,0,0,.5)}
.monster-hp{display:flex;align-items:center;gap:8px;margin-top:6px;background:rgba(0,0,0,.4);padding:4px 12px;border-radius:20px;border:1px solid rgba(255,255,255,.1)}
.monster-hp label{color:#aab;font-size:11px}
.monster-hp-bar{width:100px;height:8px;background:#333;border-radius:4px;overflow:hidden;border:1px solid #555}
.monster-hp-fill{height:100%;width:85%;background:linear-gradient(90deg,#ff4444,#ff6644);border-radius:4px;transition:width .3s}
.monster-hp-val{color:#fff;font-size:11px;min-width:40px;text-align:right}

/* ── Damage popup ── */
.dmg-popup{position:absolute;top:28%;right:30%;font-size:28px;font-weight:bold;color:#ffcc00;text-shadow:0 0 10px rgba(255,200,0,.5),2px 2px 0 #000;animation:dmgFloat 1s ease-out forwards;pointer-events:none;z-index:10}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

/* ── Bottom: Player Zone ── */
.player-zone{padding:8px 16px 6px;display:flex;align-items:flex-end;gap:12px;position:relative}
.player-sprite{width:48px;height:48px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,.15);flex-shrink:0;background:rgba(0,0,0,.3)}
.player-sprite img{width:100%;height:100%;object-fit:cover}
.player-info{flex:1}
.player-name{color:#fff;font-size:13px;font-weight:bold;margin-bottom:2px}
.player-hp-bar{height:6px;background:#222;border-radius:3px;overflow:hidden;width:100%;border:1px solid #444}
.player-hp-fill{height:100%;width:92%;background:linear-gradient(90deg,#44cc44,#66ee66);border-radius:3px}
.player-hp-text{color:#aab;font-size:10px;margin-top:1px}

/* ── Battle Log Window ── */
.log-window{background:rgba(0,0,0,.7);border:2px solid #446;border-radius:6px;margin:6px 12px;padding:6px 10px;min-height:48px;display:flex;align-items:center}
.log-text{color:#ccd;font-size:12px;line-height:1.5;font-weight:bold;text-shadow:0 1px 0 #000}
.log-text .hl{color:#ffcc44}
.log-text .hp{color:#66ee66}
.log-text .dmg{color:#ff6644}

/* ── Command Menu ── */
.cmd-menu{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:8px 12px 12px}
.cmd-btn{background:linear-gradient(180deg,#2a3a5a,#1a2a4a);border:2px solid #4a6a8a;border-radius:8px;padding:10px 0;color:#dde;font-size:14px;font-weight:bold;text-align:center;cursor:pointer;transition:all .1s;font-family:'DQF',monospace;text-shadow:0 1px 0 #000;position:relative;top:0;box-shadow:0 3px 0 #0a1a2a}
.cmd-btn:active{top:2px;box-shadow:0 1px 0 #0a1a2a;background:linear-gradient(180deg,#3a4a6a,#2a3a5a)}
.cmd-btn .ico{display:block;font-size:18px;margin-bottom:2px}
.cmd-btn .lbl{font-size:11px;opacity:.7}

/* ── Result overlay ── */
.result{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;animation:fadeIn .3s}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.result h1{font-size:42px;margin-bottom:8px;text-shadow:0 4px 20px rgba(255,200,0,.3)}
.result .sub{color:#fff;font-size:14px;margin-bottom:20px;text-shadow:0 2px 4px #000}
.result .rewards{display:flex;gap:12px;margin-bottom:20px}
.result .reward-item{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;color:#ffcc44;font-size:13px;font-weight:bold}
.result button{background:#f59e0b;border:none;border-radius:8px;padding:10px 32px;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;font-family:'DQF',monospace;box-shadow:0 3px 0 #b87a00}
.result button:active{transform:translateY(2px);box-shadow:0 1px 0 #b87a00}

/* ── Reponse / dbt footer ── */
.dbt-footer{margin:4px 12px 8px;padding:8px 10px;background:rgba(0,0,0,.5);border:1px solid #446;border-radius:6px;color:#ccd;font-size:11px;line-height:1.4;text-align:center}
.dbt-footer .welcome{color:#889}
.dbt-footer .highlight{color:#ffcc44}
</style>
</head><body>
<div id="phone">
  <!-- Monster Zone -->
  <div class="monster-zone">
    <div class="monster-sprite"><img src="https://image.pollinations.ai/prompt/cute%20chibi%20wolf%20pixel%20art%20game%20sprite%20woodland" onerror="this.style.display='none'"></div>
    <div class="monster-name">🐺 野狼</div>
    <div class="monster-hp">
      <label>HP</label>
      <div class="monster-hp-bar"><div class="monster-hp-fill"></div></div>
      <div class="monster-hp-val">25/30</div>
    </div>
    <div class="dmg-popup">2</div>
  </div>

  <!-- Player Zone -->
  <div class="player-zone">
    <div class="player-sprite"><img src="assets-c/boy.png" onerror="this.style.display='none'"></div>
    <div class="player-info">
      <div class="player-name">🧒 小明</div>
      <div class="player-hp-bar"><div class="player-hp-fill"></div></div>
      <div class="player-hp-text">28/30</div>
    </div>
  </div>

  <!-- Battle Log -->
  <div class="log-window">
    <div class="log-text">
      <span class="dmg">⚔️ 造成 2 點傷害！</span><br>
      <span class="hp">🛡️ 野狼反擊 6 點傷害！</span>
    </div>
  </div>

  <!-- Command Menu (DQ Style) -->
  <div class="cmd-menu">
    <div class="cmd-btn"><span class="ico">⚔️</span><span class="lbl">Fight</span></div>
    <div class="cmd-btn"><span class="ico">🛡️</span><span class="lbl">Defend</span></div>
    <div class="cmd-btn"><span class="ico">💥</span><span class="lbl">Spell</span></div>
    <div class="cmd-btn"><span class="ico">🏃</span><span class="lbl">Flee</span></div>
  </div>

  <!-- Footer dbt -->
  <div class="dbt-footer">
    <span class="highlight">⚔️ 進入戰鬥！vs 野狼</span>
  </div>
</div>
<div style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);color:#555;font-size:11px;font-family:sans-serif">Dragon Quest Style Battle Mock · Kids Town</div>
</body></html>
