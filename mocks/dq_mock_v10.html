<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DQ Battle Mock v10 - Skills</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12082a;font-family:'Courier New',sans-serif;display:flex;justify-content:center;min-height:100dvh}
.phone{width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

.battle-bg{position:absolute;inset:0;z-index:0}
.battle-bg .sky{position:absolute;inset:0;background:linear-gradient(180deg,#12082a,#1e0e3a 30%,#2d1b4e 55%,#3a2050 75%,#2a1535)}
.battle-bg .mountains{position:absolute;bottom:25%;left:0;right:0;height:20%;background:radial-gradient(ellipse 140px 70px at 10% 100%,rgba(60,35,90,.5),transparent),radial-gradient(ellipse 120px 60px at 30% 100%,rgba(50,25,80,.4),transparent),radial-gradient(ellipse 160px 80px at 50% 100%,rgba(70,45,100,.45),transparent),radial-gradient(ellipse 100px 50px at 70% 100%,rgba(40,30,70,.35),transparent),radial-gradient(ellipse 130px 65px at 88% 100%,rgba(60,35,90,.4),transparent)}
.battle-bg .ground{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(0deg,#1a2a18,#1e2e1c 30%,#263624 60%,transparent)}
.battle-bg .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.4}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.7}}
.battle-bg .star:nth-child(1){top:5%;left:10%;animation:twinkle 3s infinite}
.battle-bg .star:nth-child(2){top:9%;left:75%;animation:twinkle 3s infinite 1s}
.battle-bg .star:nth-child(3){top:3%;left:40%;animation:twinkle 3s infinite 2s}
.battle-bg .star:nth-child(4){top:12%;left:88%;animation:twinkle 3s infinite .5s}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .35s ease}

@keyframes hitFlash{0%{filter:brightness(1)}15%{filter:brightness(4) saturate(0)}30%{filter:brightness(2)}100%{filter:brightness(1)}}
.hit{animation:hitFlash .35s ease}

@keyframes deathFade{0%{opacity:1;transform:scale(1)}40%{transform:scale(1.15) rotate(5deg);opacity:.7}100%{opacity:0;transform:scale(.2) translateY(30px)}}
.monster-card.dead{animation:deathFade .6s forwards}

/* Heavy hit - larger burst */
@keyframes heavyHit{0%{filter:brightness(1);transform:scale(1)}10%{filter:brightness(5) saturate(0);transform:scale(1.1)}30%{filter:brightness(2)}100%{filter:brightness(1);transform:scale(1)}}
.heavy-hit{animation:heavyHit .4s ease}

/* Heal effect */
@keyframes healGlow{0%{box-shadow:inset 0 0 0 rgba(102,238,136,0)}50%{box-shadow:inset 0 0 30px rgba(102,238,136,.4)}100%{box-shadow:inset 0 0 0 rgba(102,238,136,0)}}
.heal-glow{animation:healGlow .6s ease}

@keyframes healFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.4)}}
.heal-popup{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:22px;font-weight:bold;color:#66ee88;text-shadow:0 0 10px rgba(102,238,136,.5),2px 2px 0 #000;z-index:10;pointer-events:none;animation:healFloat .9s ease forwards}

/* Buff icon */
@keyframes buffPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
.buff-icon{display:inline-block;font-size:16px;animation:buffPulse .8s ease-in-out infinite;margin-left:4px;vertical-align:middle}

@keyframes buffAppear{0%{opacity:0;transform:scale(0) rotate(-180deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.buff-icon-appear{animation:buffAppear .3s ease forwards;display:inline-block;font-size:16px;margin-left:4px;vertical-align:middle}

/* Damage popup for heavy */
.dmg-popup{position:absolute;top:-15px;left:50%;transform:translateX(-50%);font-size:24px;font-weight:bold;color:#ffcc00;text-shadow:0 0 15px rgba(255,200,0,.6),2px 2px 0 #000;z-index:10;pointer-events:none;animation:dmgFloat .8s ease forwards}
@keyframes dmgFloat{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-50px) scale(1.3)}}
.dmg-popup.heavy{font-size:30px;color:#ff8800;text-shadow:0 0 20px rgba(255,136,0,.7),3px 3px 0 #000}
.dmg-popup.spl{color:#ddaaff}

.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

/* Monster zone */
.monster-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px 10px 4px;min-height:200px}
.monster-row{display:flex;justify-content:center;gap:8px;width:100%;flex-wrap:wrap;align-items:flex-end}
.monster-card{width:76px;text-align:center;cursor:pointer;padding:4px;border-radius:12px;border:2px solid transparent;position:relative}
.monster-card:active{transform:scale(.92)}
.monster-card.targetable{border-color:#ffcc44;background:rgba(255,204,68,.08);animation:glow .6s infinite alternate}
@keyframes glow{0%{box-shadow:0 0 8px rgba(255,204,68,.2)}100%{box-shadow:0 0 20px rgba(255,204,68,.5)}}
.monster-card .m-img{width:60px;height:60px;margin:0 auto}
.monster-card .m-img img{width:100%;height:100%;object-fit:contain;display:block}
.monster-card .m-name{color:#ffe0bb;font-size:11px;font-weight:bold;margin-top:2px;text-shadow:0 1px 4px #000}
.monster-card .m-hp-bar{height:5px;background:rgba(0,0,0,.5);border-radius:2px;margin:2px 4px 0;border:1px solid rgba(255,255,255,.08)}
.monster-card .m-hp-fill{height:100%;border-radius:2px}
.monster-card .m-hp-text{color:#ddd;font-size:10px;margin-top:1px;text-shadow:0 1px 3px #000;font-weight:bold}
.monster-card .target-arrow{display:none;position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:16px;color:#ffcc44}
.monster-card.targetable .target-arrow{display:block;animation:arrowBounce .5s infinite alternate}
@keyframes arrowBounce{0%{transform:translateX(-50%) translateY(0)}100%{transform:translateX(-50%) translateY(-4px)}}

/* Player zone */
/* Player zone - make cards clickable when targeting */
.player-zone{padding:2px 10px 6px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.player-card{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 6px;width:auto;min-width:95px;max-width:115px;cursor:default;transition:all .15s}
.player-card.targetable{cursor:pointer;border-color:#66ee88;background:rgba(102,238,136,.08);animation:glowGreen .6s infinite alternate}
@keyframes glowGreen{0%{box-shadow:0 0 8px rgba(102,238,136,.2)}100%{box-shadow:0 0 20px rgba(102,238,136,.5)}}
.player-card.targetable:active{transform:scale(.92)}
.player-card .p-row{display:flex;gap:5px}
.player-card .p-img{width:30px;height:30px;flex-shrink:0}
.player-card .p-img img{width:100%;height:100%;object-fit:cover;display:block;border-radius:3px}
.player-card .p-name{color:#fff;font-size:11px;font-weight:bold;text-shadow:0 1px 3px #000;margin-bottom:3px}

/* HP/MP overlay bars */
.player-card .bar{position:relative;height:14px;margin-bottom:2px}
.player-card .bar-track{position:absolute;inset:0;height:14px;background:rgba(0,0,0,.4);border-radius:4px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
.player-card .bar-fill{height:100%;border-radius:3px}
.player-card .bar-fill.hp{background:#33dd55}
.player-card .bar-fill.mp{background:#4488ff}
.player-card .bar-lbl{position:absolute;left:2px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:bold;z-index:1;text-shadow:0 1px 2px #000}
.player-card .bar-lbl.h{color:#ff5555}
.player-card .bar-lbl.m{color:#5577ff}
.player-card .bar-val{position:absolute;right:2px;top:50%;transform:translateY(-50%);font-size:8px;font-weight:bold;color:#fff;z-index:1;text-shadow:0 1px 2px #000}

/* Log */
.log-window{background:rgba(0,0,0,.75);border:2px solid #4a5a7a;border-radius:8px;margin:2px 10px;padding:5px 10px;min-height:40px}
.log-text{color:#ccd;font-size:12px;line-height:1.5;font-weight:bold}
.log-text .atk{color:#ff8844}.log-text .def{color:#66ee66}.log-text .skl{color:#ddaaff}.log-text .info{color:#aabbdd}

/* Commands */
.cmd-menu{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:3px 10px 6px}
.cmd-btn{background:linear-gradient(180deg,#1f3055,rgba(13,27,42,.9));border:2px solid #4a6a8a;border-radius:10px;padding:9px 0;color:#cce;font-size:16px;font-weight:bold;text-align:center;cursor:pointer;font-family:inherit;text-shadow:0 1px 0 #000;box-shadow:0 3px 0 #0a1a2a;transition:all .08s}
.cmd-btn:active{transform:translateY(3px);box-shadow:none}
.cmd-btn.active{background:linear-gradient(180deg,#2a4570,#1f3055);border-color:#ffcc44;color:#ffe0aa}

/* Skill overlay */
.skill-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.skill-overlay.active{display:flex}
.skill-overlay h3{color:#ddaaff;font-size:18px;margin-bottom:4px;text-shadow:0 2px 6px #000}
.skill-overlay .mp-hint{color:#889;font-size:11px;margin-bottom:12px}
.skill-grid{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.skill-item{background:rgba(40,30,60,.85);border:2px solid #6a4a8a;border-radius:10px;padding:10px 14px;text-align:center;cursor:pointer;width:90px;transition:all .1s}
.skill-item:active{background:rgba(60,40,80,.9);border-color:#8a6aaa}
.skill-item .s-icon{font-size:24px;display:block;margin-bottom:2px}
.skill-item .s-name{color:#ddaaff;font-size:12px;font-weight:bold}
.skill-item .s-mp{color:#6688ff;font-size:10px;margin-top:2px;font-weight:bold}
.skill-item .s-desc{color:#889;font-size:8px;margin-top:1px}
.skill-item .s-level{color:#888;font-size:8px;margin-top:1px}
.skill-item.disabled{opacity:.4;pointer-events:none}
.skill-back{color:#889;font-size:12px;margin-top:14px;cursor:pointer;padding:5px 20px;border:1px solid #557;border-radius:6px}

/* Footer */
.dbt-footer{margin:1px 10px 6px;padding:6px 10px;background:rgba(0,0,0,.55);border:1.5px solid #4a5a7a;border-radius:7px;color:#cce;font-size:12px;text-align:center}
.dbt-footer .hl{color:#ffcc44}

/* Result */
.result-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center}
.result-overlay.active{display:flex}
.result-overlay h1{font-size:36px}.result-overlay .sub{color:#fff;font-size:15px;margin:4px 0 12px;font-weight:bold}
.result-overlay .rewards{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.result-overlay .r-item{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);border-radius:6px;padding:5px 10px;color:#ffcc44;font-size:12px;font-weight:bold}
.result-overlay button{background:#f59e0b;border:none;border-radius:8px;padding:7px 24px;color:#fff;font-size:14px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #b87a00}
</style>
</head><body>
<div class="phone">
  <div class="battle-bg"><div class="sky"></div><div class="mountains"></div><div class="ground"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
  </div>
  <div class="content" id="mainContent">
    <div class="monster-zone"><div class="monster-row" id="monsterRow"></div></div>
    <div class="player-zone" id="playerZone"></div>
    <div class="log-window">
      <div class="log-text" id="logText"><span class="info">⚔️ 戰鬥開始！</span><br><span class="info">🌲 3 隻野狼出現了！</span></div>
    </div>
    <div class="cmd-menu">
      <div class="cmd-btn" id="btnFight" onclick="startTarget('attack')">⚔️ 攻擊</div>
      <div class="cmd-btn" onclick="doAction('defend')">🛡️ 防禦</div>
      <div class="cmd-btn" id="btnSkill" onclick="openSkills()">💥 技能</div>
      <div class="cmd-btn" onclick="doAction('flee')">🏃 逃走</div>
    </div>
    <div class="dbt-footer" id="dbtFooter"><span class="hl">⚔️ 進入戰鬥！vs 3 隻野狼</span></div>
  </div>

  <!-- Skill Overlay -->
  <div class="skill-overlay" id="skillOverlay">
    <h3>💥 選擇技能</h3>
    <div class="mp-hint">使用技能需要消耗 MP</div>
    <div class="skill-grid" id="skillGrid"></div>
    <div class="skill-back" onclick="hideSkills()">↩️ 返回</div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <h1>🎉</h1><div class="sub">戰鬥勝利！</div>
    <div class="rewards" id="rewards"></div>
    <button onclick="this.closest('.result-overlay').classList.remove('active')">👍 太好了！</button>
  </div>
</div>

<script>
// ── Mock data: buildings determine available skills ──
const BUILDINGS = [
  { def_id: 6, name: '探險公會', level: 1 },           // Expedition guild
  { def_id: 7, name: '健身房',   level: 2 },             // Gym lv2 → 重擊
  { def_id: 8, name: '醫院',     level: 3 },             // Hospital lv3 → 急救
];

// Skill definitions
const SKILL_DEFS = [
  { id:'heavy', name:'重擊', icon:'💪', mpCost:5, lvReq:2, bldgId:7, desc:'強力一擊！', dmgBase:8, dmgPerLv:3, attr:'str', target:'enemy' },
  { id:'heal',  name:'急救', icon:'💚', mpCost:8, lvReq:3, bldgId:8, desc:'回復我方血量', healBase:10, healPerLv:4, attr:'int', target:'ally' },
  { id:'power', name:'蓄力', icon:'🔥', mpCost:3, lvReq:1, bldgId:7, desc:'下次攻擊x1.5', dmgBase:0, attr:'str', target:'self' },
];

// Filter skills based on buildings
function getAvailableSkills() {
  return SKILL_DEFS.filter(sk => {
    const bldg = BUILDINGS.find(b => b.def_id === sk.bldgId);
    return bldg && bldg.level >= sk.lvReq;
  });
}

const MONSTERS = [
  { n:'小野狼', i:'🐺', hp:18, mh:22, lv:1 },
  { n:'灰狼',   i:'🐺', hp:22, mh:26, lv:1 },
  { n:'頭狼',   i:'🐺', hp:30, mh:35, lv:2 },
];
const PARTY = [
  { n:'小明', img:'assets-c/boy.png',  hp:28, mh:30, mp:12, mm:15, lv:3, str:8, inte:5, buff:null },
  { n:'小美', img:'assets-c/girl.png', hp:22, mh:24, mp:18, mm:20, lv:2, str:4, inte:9, buff:null },
  { n:'阿強', img:'assets-c/boy2.png', hp:36, mh:40, mp:6,  mm:10, lv:3, str:10,inte:3, buff:null },
];
const MIMG = 'https://image.pollinations.ai/prompt/cute%20chibi%20wolf%20pixel%20art%20game%20sprite%20transparent%20bg';
let T = null; // targeting mode
let pendingSkill = null; // skill about to use

function r(){
  const row=document.getElementById('monsterRow');
  const alive=MONSTERS.filter(m=>m.hp>0);
  const showMonsterTarget = T==='attack' || (pendingSkill && pendingSkill.target==='enemy');
  row.innerHTML=alive.map((m,i)=>{
    const o=MONSTERS.indexOf(m),p=Math.round(m.hp/m.mh*100),bc=p>50?'#44cc44':p>25?'#ffaa44':'#ff4444';
    return `<div class="monster-card ${showMonsterTarget?'targetable':''}" data-idx="${o}" onclick="c(${o})">
      <div class="target-arrow">▼</div>
      <div class="m-img"><img src="${MIMG}" onerror="this.outerHTML='<span style=font-size:40px>${m.i}</span>'"></div>
      <div class="m-name">${m.i} ${m.n} Lv.${m.lv}</div>
      <div class="m-hp-bar"><div class="m-hp-fill" style="width:${p}%;background:${bc}"></div></div>
      <div class="m-hp-text">${m.hp}/${m.mh}</div>
    </div>`;
  }).join('');
  if(alive.length===0&&!document.getElementById('resultOverlay').classList.contains('active'))
    setTimeout(()=>{document.getElementById('resultOverlay').classList.add('active');
      document.getElementById('rewards').innerHTML='<span class="r-item">🪙 30</span><span class="r-item">🪵 x3</span><span class="r-item">✨ x50</span>';},600);

  const showAllyTarget = pendingSkill && pendingSkill.target==='ally';
  document.getElementById('playerZone').innerHTML=PARTY.map((p,pIdx)=>{
    const h=Math.round(p.hp/p.mh*100),m=Math.round(p.mp/p.mm*100);
    return `<div class="player-card ${showAllyTarget?'targetable':''}" onclick="${showAllyTarget ? `cAlly(${pIdx})` : ''}">
      <div class="p-row">
        <div class="p-img"><img src="${p.img}" onerror="this.outerHTML='<span style=font-size:22px>🧒</span>'"></div>
        <div style="flex:1">
          <div class="p-name">Lv.${p.lv} ${p.n}${p.buff ? `<span class="buff-icon-appear">${p.buff.icon}</span>` : ''}</div>
          <div class="bar"><div class="bar-track"><div class="bar-fill hp" style="width:${h}%"></div></div><span class="bar-lbl h">HP</span><span class="bar-val">${p.hp}/${p.mh}</span></div>
          <div class="bar"><div class="bar-track"><div class="bar-fill mp" style="width:${m}%"></div></div><span class="bar-lbl m">MP</span><span class="bar-val">${p.mp}/${p.mm}</span></div>
        </div>
      </div>
    </div>`;
  }).join('');
  const bF=document.getElementById('btnFight'),bS=document.getElementById('btnSkill');
  if(bF)bF.classList.toggle('active',T==='attack');
  if(bS)bS.classList.toggle('active',!!pendingSkill);
}

function c(i){
  if(T==='attack'){a(i);return;}
  if(pendingSkill && pendingSkill.target==='enemy'){useSkill(i,null);return;}
}

function cAlly(pIdx){
  if(pendingSkill && pendingSkill.target==='ally'){useSkill(null,pIdx);return;}
}

function startTarget(m){
  if(T===m){T=null;r();document.getElementById('logText').innerHTML='<span class="info">⚔️ 選擇指令...</span>';return;}
  T=m;r();
  document.getElementById('logText').innerHTML='<span class="atk">⚔️ 攻擊誰？點擊怪獸選擇目標</span>';
  document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊上面的怪獸選擇目標</span>';
}

function openSkills(){
  const overlay=document.getElementById('skillOverlay');
  const grid=document.getElementById('skillGrid');
  const avail=getAvailableSkills();
  grid.innerHTML=avail.map(sk=>{
    const p=PARTY[0]; // current active character
    const enoughMP = p.mp >= sk.mpCost;
    return `<div class="skill-item ${enoughMP?'':'disabled'}" onclick="${enoughMP ? `selectSkill('${sk.id}')` : ''}">
      <span class="s-icon">${sk.icon}</span>
      <div class="s-name">${sk.name}</div>
      <div class="s-mp">MP ${sk.mpCost}</div>
      <div class="s-desc">${sk.desc}</div>
    </div>`;
  }).join('');
  overlay.classList.add('active');
}

function hideSkills(){document.getElementById('skillOverlay').classList.remove('active')}

function selectSkill(skillId){
  hideSkills();
  const sk = SKILL_DEFS.find(s=>s.id===skillId);
  pendingSkill = sk;
  T=null;

  if(sk.target==='self'){
    // Self-cast: apply immediately
    useSkill(null, 0);
    return;
  }

  r();
  if(sk.target==='enemy'){
    document.getElementById('logText').innerHTML=`<span class="skl">💥 使用 ${sk.name}？點擊怪獸選擇目標</span>`;
    document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊怪獸使用技能</span>';
  } else if(sk.target==='ally'){
    document.getElementById('logText').innerHTML=`<span class="skl">💚 對誰使用 ${sk.name}？點擊隊友選擇目標</span>`;
    document.getElementById('dbtFooter').innerHTML='<span class="hl">👆 點擊隊友使用技能</span>';
  }
}

function useSkill(monsterIdx, playerIdx){
  const sk=pendingSkill;
  if(!sk)return;
  pendingSkill=null;

  if(sk.target==='self') playerIdx = 0; // default to first party member
  const p=PARTY[playerIdx || 0];
  if(!p) return;
  p.mp=Math.max(0,p.mp-sk.mpCost);
  
  let msg='';
  if(sk.id==='heavy'){
    const bldg=BUILDINGS.find(b=>b.def_id===sk.bldgId);
    const lvlBonus=(bldg?bldg.level:1)*sk.dmgPerLv;
    const dmg=sk.dmgBase+lvlBonus+Math.floor(p.str/2)+Math.floor(Math.random()*4);
    MONSTERS[monsterIdx].hp=Math.max(0,MONSTERS[monsterIdx].hp-dmg);
    msg=`<span class="skl">💪 ${p.n} 使用 ${sk.name}！造成 ${dmg} 點傷害！</span>`;
    
    // Heavy hit animation - bigger burst
    const mc=document.querySelector(`.monster-card[data-idx="${monsterIdx}"]`);
    if(mc){
      mc.classList.add('heavy-hit');
      document.getElementById('mainContent').classList.add('shake');
      // Heavy damage popup
      const pop=document.createElement('div');
      pop.className='dmg-popup heavy';pop.textContent=dmg;
      mc.querySelector('.m-img').appendChild(pop);
      setTimeout(()=>pop.remove(),800);
      setTimeout(()=>{
        mc.classList.remove('heavy-hit');
        document.getElementById('mainContent').classList.remove('shake');
        MONSTERS[monsterIdx].hp<=0?(mc.classList.add('dead'),setTimeout(()=>r(),600)):r();
      },400);
    }else r();
    
  } else if(sk.id==='heal'){
    const bldg=BUILDINGS.find(b=>b.def_id===sk.bldgId);
    const lvlBonus=(bldg?bldg.level:1)*sk.healPerLv;
    const heal=sk.healBase+lvlBonus+Math.floor(p.inte/2);
    PARTY[playerIdx].hp=Math.min(PARTY[playerIdx].mh, PARTY[playerIdx].hp+heal);
    msg=`<span class="skl">💚 ${p.n} 對 ${PARTY[playerIdx].n} 使用 ${sk.name}！回復 ${heal} 點 HP！</span>`;
    
    // Heal animation
    r();
    const pc=document.querySelectorAll('.player-card')[playerIdx];
    if(pc){
      pc.classList.add('heal-glow');
      const pop=document.createElement('div');
      pop.className='heal-popup';pop.textContent='+'+heal;
      pc.querySelector('.p-img').appendChild(pop);
      setTimeout(()=>{pop.remove();pc.classList.remove('heal-glow')},900);
    }
    
  } else if(sk.id==='power'){
    p.buff = {type:'power', icon:'🔥', name:'蓄力'};
    msg=`<span class="skl">🔥 ${p.n} 蓄力！下次攻擊 1.5 倍！</span>`;
    r();
    // Flash effect on player card
    const pc=document.querySelectorAll('.player-card')[playerIdx || 0];
    if(pc){pc.classList.add('heal-glow');setTimeout(()=>pc.classList.remove('heal-glow'),500);}
  }

  document.getElementById('logText').innerHTML = msg;
  document.getElementById('dbtFooter').innerHTML = `<span class="hl">💥 ${sk.name}！</span>`;
  T=null;
}

function doAction(t){
  T=null;pendingSkill=null;r();
  const e=document.getElementById('logText'),f=document.getElementById('dbtFooter');
  if(t==='defend'){e.innerHTML='<span class="def">🛡️ 小明 防禦姿態！</span>';f.innerHTML='🛡️ 防禦中！'}
  if(t==='flee'){e.innerHTML='<span class="info">🏃 逃走了！</span>';f.innerHTML='🏃 返回小鎮...'}
}

function a(i){
  T=null;
  let d=3+Math.floor(Math.random()*5);
  const p=PARTY[0];
  let hadBuff = p.buff !== null;
  // Apply buff
  if(p.buff && p.buff.type==='power'){
    d = Math.round(d * 1.5);
    p.buff = null; // consume buff
  }
  MONSTERS[i].hp=Math.max(0,MONSTERS[i].hp-d);
  const mc=document.querySelector(`.monster-card[data-idx="${i}"]`);
  if(mc){mc.classList.add('hit');document.getElementById('mainContent').classList.add('shake');
    setTimeout(()=>{mc.classList.remove('hit');document.getElementById('mainContent').classList.remove('shake');
      MONSTERS[i].hp<=0?(mc.classList.add('dead'),setTimeout(()=>r(),600)):r();},350);
  }else r();
  document.getElementById('logText').innerHTML=`<span class="atk">⚔️ 小明 攻擊 ${MONSTERS[i].n}！${hadBuff?'（蓄力效果！）':''}</span><br><span class="atk">🐺 ${d} 點傷害！</span>`;
  document.getElementById('dbtFooter').innerHTML=`<span class="hl">⚔️ ${MONSTERS[i].n} 受到 ${d} 點傷害！</span>`;
}

r();
</script></body></html>
