<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>DQ Battle Mock v5 - Larger</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#12082a;font-family:'Courier New',monospace;display:flex;justify-content:center;min-height:100dvh}
.phone{width:100%;max-width:440px;min-height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden}

/* ── Battle Background ── */
.battle-bg{position:absolute;inset:0;z-index:0}
.battle-bg .sky{position:absolute;inset:0;background:linear-gradient(180deg,#12082a 0%,#1e0e3a 30%,#2d1b4e 55%,#3a2050 75%,#2a1535 100%)}
.battle-bg .mountains{position:absolute;bottom:25%;left:0;right:0;height:20%;background:
  radial-gradient(ellipse 140px 70px at 10% 100%,rgba(60,35,90,.5),transparent),
  radial-gradient(ellipse 120px 60px at 30% 100%,rgba(50,25,80,.4),transparent),
  radial-gradient(ellipse 160px 80px at 50% 100%,rgba(70,45,100,.45),transparent),
  radial-gradient(ellipse 100px 50px at 70% 100%,rgba(40,30,70,.35),transparent),
  radial-gradient(ellipse 130px 65px at 88% 100%,rgba(60,35,90,.4),transparent)}
.battle-bg .ground{position:absolute;bottom:0;left:0;right:0;height:28%;background:linear-gradient(0deg,#1a2a18 0%,#1e2e1c 30%,#263624 60%,transparent 100%)}
.battle-bg .star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;opacity:.4}
.battle-bg .star:nth-child(1){top:5%;left:10%;animation:twinkle 3s ease-in-out infinite}
.battle-bg .star:nth-child(2){top:9%;left:75%;animation:twinkle 3s ease-in-out infinite 1s}
.battle-bg .star:nth-child(3){top:3%;left:40%;animation:twinkle 3s ease-in-out infinite 2s}
.battle-bg .star:nth-child(4){top:12%;left:88%;animation:twinkle 3s ease-in-out infinite .5s}
.battle-bg .star:nth-child(5){top:1%;left:25%;animation:twinkle 3s ease-in-out infinite 1.5s}
@keyframes twinkle{0%,100%{opacity:.3}50%{opacity:.7}}

.content{position:relative;z-index:1;flex:1;display:flex;flex-direction:column}

/* ── Monster Zone ── */
.monster-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:16px 10px 8px;gap:4px;min-height:200px}
.monster-row{display:flex;justify-content:center;gap:8px;width:100%;flex-wrap:wrap;align-items:flex-end}
.monster-card{width:80px;text-align:center}
.monster-card .m-img{width:64px;height:64px;margin:0 auto;position:relative}
.monster-card .m-img img{width:100%;height:100%;object-fit:contain;display:block;filter:drop-shadow(0 4px 12px rgba(255,80,0,.25))}
.monster-card .m-name{color:#ffe0bb;font-size:11px;font-weight:bold;margin-top:3px;text-shadow:0 1px 4px #000}
.monster-card .m-hp-bar{height:6px;background:rgba(0,0,0,.5);border-radius:3px;overflow:hidden;margin:3px 4px 0;border:1px solid rgba(255,255,255,.1)}
.monster-card .m-hp-fill{height:100%;border-radius:2px}
.monster-card .m-hp-text{color:#ddd;font-size:10px;margin-top:1px;text-shadow:0 1px 3px #000;font-weight:bold}

/* ── Player Zone ── */
.player-zone{padding:4px 12px 8px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.player-card{display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:5px 8px;width:auto;min-width:105px;max-width:130px}
.player-card .p-img{width:32px;height:32px;border-radius:4px;overflow:hidden;flex-shrink:0}
.player-card .p-img img{width:100%;height:100%;object-fit:cover}
.player-card .p-info{flex:1;min-width:0}
.player-card .p-name{color:#fff;font-size:11px;font-weight:bold;text-shadow:0 1px 3px #000}
.player-card .p-bars{display:flex;gap:4px;align-items:center;margin-top:2px}
.player-card .p-hp{flex:1;height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden}
.player-card .p-hp-fill{height:100%;background:linear-gradient(90deg,#44cc44,#66ee66);border-radius:3px}
.player-card .p-mp{flex:1;height:5px;background:rgba(0,0,0,.4);border-radius:3px;overflow:hidden}
.player-card .p-mp-fill{height:100%;background:linear-gradient(90deg,#4488ff,#66aaff);border-radius:3px}
.player-card .p-stats{color:#bbc;font-size:9px;margin-left:3px;white-space:nowrap;font-weight:bold}

/* ── Battle Log ── */
.log-window{background:rgba(0,0,0,.75);border:2px solid #4a5a7a;border-radius:8px;margin:3px 10px;padding:6px 10px;min-height:44px;display:flex;flex-direction:column;justify-content:center}
.log-text{color:#ccd;font-size:12px;line-height:1.5;font-weight:bold}
.log-text .atk{color:#ff8844}
.log-text .def{color:#66ee66}
.log-text .spl{color:#88bbff}
.log-text .info{color:#aabbdd}

/* ── Command Buttons ── */
.cmd-menu{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 10px 8px}
.cmd-btn{background:linear-gradient(180deg,#1f3055,rgba(13,27,42,.9));border:2px solid #4a6a8a;border-radius:10px;padding:10px 0;color:#cce;font-size:16px;font-weight:bold;text-align:center;cursor:pointer;font-family:inherit;text-shadow:0 1px 0 #000;box-shadow:0 3px 0 #0a1a2a;transition:all .08s}
.cmd-btn:active{transform:translateY(3px);box-shadow:none}

/* ── Footer ── */
.dbt-footer{margin:2px 10px 8px;padding:7px 10px;background:rgba(0,0,0,.55);border:1.5px solid #4a5a7a;border-radius:7px;color:#cce;font-size:12px;line-height:1.4;text-align:center}
.dbt-footer .hl{color:#ffcc44}

/* ── Target Overlay ── */
.target-overlay{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.target-overlay.active{display:flex}
.target-overlay h3{color:#ffcc44;font-size:18px;margin-bottom:14px;text-shadow:0 2px 6px #000}
.target-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.target-item{background:rgba(35,45,70,.8);border:2px solid #5a7a9a;border-radius:10px;padding:10px 16px;text-align:center;cursor:pointer;width:80px}
.target-item:active{background:rgba(55,75,110,.8);border-color:#7a9aba}
.target-item .t-icon{font-size:28px;display:block;margin-bottom:4px}
.target-item .t-name{color:#fff;font-size:11px;font-weight:bold}
.target-item .t-hp{color:#99a;font-size:9px;margin-top:2px}
.target-back{color:#99a;font-size:12px;margin-top:16px;cursor:pointer;padding:6px 20px;border:1px solid #557;border-radius:6px;background:rgba(255,255,255,.03)}

/* ── Result Overlay ── */
.result-overlay{position:absolute;inset:0;background:rgba(0,0,0,.78);z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center}
.result-overlay.active{display:flex}
.result-overlay h1{font-size:36px;margin-bottom:4px}
.result-overlay .sub{color:#fff;font-size:15px;margin:4px 0 14px;font-weight:bold}
.result-overlay .rewards{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.result-overlay .r-item{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.12);border-radius:7px;padding:6px 12px;color:#ffcc44;font-size:13px;font-weight:bold}
.result-overlay button{background:#f59e0b;border:none;border-radius:8px;padding:8px 28px;color:#fff;font-size:15px;font-weight:bold;cursor:pointer;font-family:inherit;box-shadow:0 3px 0 #b87a00}
.result-overlay button:active{transform:translateY(3px);box-shadow:none}
</style>
</head><body>
<div class="phone">
  <div class="battle-bg">
    <div class="sky"></div>
    <div class="mountains"></div>
    <div class="ground"></div>
    <div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div><div class="star"></div>
  </div>

  <div class="content">
    <div class="monster-zone"><div class="monster-row" id="monsterRow"></div></div>
    <div class="player-zone" id="playerZone"></div>

    <div class="log-window">
      <div class="log-text" id="logText"><span class="info">⚔️ 戰鬥開始！</span><br><span class="info">🌲 3 隻野狼出現了！</span></div>
    </div>

    <div class="cmd-menu">
      <div class="cmd-btn" onclick="showTargets('attack')">⚔️ Fight</div>
      <div class="cmd-btn" onclick="doAction('defend')">🛡️ Defend</div>
      <div class="cmd-btn" onclick="showTargets('spell')">💥 Spell</div>
      <div class="cmd-btn" onclick="doAction('flee')">🏃 Flee</div>
    </div>

    <div class="dbt-footer" id="dbtFooter"><span class="hl">⚔️ 進入戰鬥！vs 3 隻野狼</span></div>
  </div>

  <div class="target-overlay" id="targetOverlay">
    <h3 id="targetTitle">🎯 選擇目標</h3>
    <div class="target-grid" id="targetGrid"></div>
    <div class="target-back" onclick="hideTargets()">↩️ 返回</div>
  </div>

  <div class="result-overlay" id="resultOverlay">
    <h1>🎉</h1>
    <div class="sub">戰鬥勝利！</div>
    <div class="rewards" id="rewards"></div>
    <button onclick="this.closest('.result-overlay').classList.remove('active')">👍 太好了！</button>
  </div>
</div>

<script>
const MONSTERS = [
  { n:'小野狼', i:'🐺', hp:18, mh:22, lv:1 },
  { n:'灰狼',   i:'🐺', hp:22, mh:26, lv:1 },
  { n:'頭狼',   i:'🐺', hp:30, mh:35, lv:2 },
];
const PARTY = [
  { n:'小明', img:'assets-c/boy.png',  hp:28, mh:30, mp:12, mm:15, lv:3 },
  { n:'小美', img:'assets-c/girl.png', hp:22, mh:24, mp:18, mm:20, lv:2 },
  { n:'阿強', img:'assets-c/boy2.png', hp:36, mh:40, mp:6,  mm:10, lv:3 },
];
const MIMG = 'https://image.pollinations.ai/prompt/cute%20chibi%20wolf%20pixel%20art%20game%20sprite%20transparent%20bg';

function render(){
  const row = document.getElementById('monsterRow');
  row.innerHTML = MONSTERS.map(m => {
    const p = Math.round(m.hp/m.mh*100);
    const bc = p>50?'#44cc44':p>25?'#ffaa44':'#ff4444';
    return `<div class="monster-card">
      <div class="m-img"><img src="${MIMG}" onerror="this.outerHTML='<span style=font-size:42px>${m.i}</span>'"></div>
      <div class="m-name">${m.i} ${m.n} Lv.${m.lv}</div>
      <div class="m-hp-bar"><div class="m-hp-fill" style="width:${p}%;background:${bc}"></div></div>
      <div class="m-hp-text">${m.hp}/${m.mh}</div>
    </div>`;
  }).join('');

  const zone = document.getElementById('playerZone');
  zone.innerHTML = PARTY.map(p => {
    const hp = Math.round(p.hp/p.mh*100);
    const mp = Math.round(p.mp/p.mm*100);
    return `<div class="player-card">
      <div class="p-img"><img src="${p.img}" onerror="this.outerHTML='<span style=font-size:24px>🧒</span>'"></div>
      <div class="p-info">
        <div class="p-name">Lv.${p.lv} ${p.n}</div>
        <div class="p-bars">
          <div class="p-hp"><div class="p-hp-fill" style="width:${hp}%"></div></div>
          <div class="p-mp"><div class="p-mp-fill" style="width:${mp}%"></div></div>
          <div class="p-stats">${p.hp}/${p.mp}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function showTargets(t){
  document.getElementById('targetOverlay').classList.add('active');
  document.getElementById('targetTitle').textContent = t==='attack'?'⚔️ 選擇攻擊目標':'💥 選擇魔法目標';
  document.getElementById('targetGrid').innerHTML = MONSTERS.map((m,i) =>
    `<div class="target-item" onclick="doAttack(${i})">
      <span class="t-icon">${m.i}</span>
      <div class="t-name">${m.n}</div>
      <div class="t-hp">HP ${m.hp}</div>
    </div>`
  ).join('') + `<div class="target-item" onclick="doAll()"><span class="t-icon">🌊</span><div class="t-name">全體</div><div class="t-hp">全體攻擊</div></div>`;
}
function hideTargets(){document.getElementById('targetOverlay').classList.remove('active')}

function doAction(t){
  const el = document.getElementById('logText');
  const ft = document.getElementById('dbtFooter');
  if(t==='defend'){el.innerHTML='<span class="def">🛡️ 小明 防禦姿態！</span>';ft.innerHTML='🛡️ 防禦中！'}
  if(t==='flee'){el.innerHTML='<span class="info">🏃 逃走了！</span>';ft.innerHTML='🏃 返回小鎮...'}
}

function doAttack(i){
  hideTargets();
  const dmg = 3+Math.floor(Math.random()*5);
  MONSTERS[i].hp = Math.max(0,MONSTERS[i].hp-dmg);
  render();
  document.getElementById('logText').innerHTML = `<span class="atk">⚔️ 小明 攻擊 ${MONSTERS[i].n}！</span><br><span class="atk">🐺 ${dmg} 點傷害！</span>`;
  document.getElementById('dbtFooter').innerHTML = `<span class="hl">⚔️ ${MONSTERS[i].n} 受到 ${dmg} 點傷害！</span>`;
  if(MONSTERS.every(m=>m.hp<=0)) setTimeout(()=>{
    document.getElementById('resultOverlay').classList.add('active');
    document.getElementById('rewards').innerHTML = '<span class="r-item">🪙 30</span><span class="r-item">🪵 x3</span><span class="r-item">✨ x50</span>';
  },500);
}

function doAll(){
  hideTargets();
  const dmg = 1+Math.floor(Math.random()*3);
  MONSTERS.forEach(m=>{m.hp=Math.max(0,m.hp-dmg)});
  render();
  document.getElementById('logText').innerHTML = `<span class="spl">🌊 全體攻擊！造成 ${dmg} 點傷害</span>`;
  document.getElementById('dbtFooter').innerHTML = `<span class="hl">🌊 全體攻擊 ${dmg} 點傷害！</span>`;
}
render();
</script>
</body></html>
