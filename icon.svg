<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#sky)"/>
  <!-- House -->
  <rect x="180" y="220" width="150" height="180" rx="8" fill="#fff" stroke="#7c2d12" stroke-width="6"/>
  <!-- Roof -->
  <polygon points="120,230 255,100 390,230" fill="#dc2626" stroke="#7c2d12" stroke-width="6" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="235" y="290" width="50" height="110" rx="6" fill="#7c2d12"/>
  <circle cx="270" cy="350" r="5" fill="#fde047"/>
  <!-- Windows -->
  <rect x="200" y="250" width="40" height="40" rx="4" fill="#dbeafe" stroke="#7c2d12" stroke-width="4"/>
  <rect x="270" y="250" width="40" height="40" rx="4" fill="#dbeafe" stroke="#7c2d12" stroke-width="4"/>
  <!-- Tree left -->
  <rect x="130" y="320" width="16" height="80" rx="4" fill="#78350f"/>
  <circle cx="138" cy="300" r="40" fill="#15803d"/>
  <!-- Tree right -->
  <rect x="370" y="320" width="16" height="80" rx="4" fill="#78350f"/>
  <circle cx="378" cy="300" r="40" fill="#15803d"/>
  <!-- Star -->
  <text x="400" y="130" font-size="60" fill="#fef08a">⭐</text>
</svg>
